<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="210mm" height="297mm" viewBox="0 0 210 297" version="1.1" id="svg1"
   xmlns="http://www.w3.org/2000/svg">
  <!-- Level 6 "The Descent" — downward crumbling-platform gauntlet -->
  <g id="layer1">
    <!-- Top entry platform -->
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 10,20 190,0" id="p1" />
    <!-- Descent series: zig-zag downward platforms -->
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 10,40 80,0" id="p2" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 120,60 80,0" id="p3" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 20,90 80,0" id="p4" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 130,110 70,0" id="p5" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 10,140 90,0" id="p6" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 110,160 90,0" id="p7" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 20,190 80,0" id="p8" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 120,210 80,0" id="p9" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 10,240 90,0" id="p10" />
    <!-- Bottom floor -->
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 30,265 170,0" id="p11" />
    <!-- Vertical connector walls to make gaps traversable -->
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 90,40 0,20" id="v1" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 100,60 0,30" id="v2" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 110,90 0,20" id="v3" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 100,140 0,20" id="v4" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 110,190 0,20" id="v5" />
  </g>
</svg>
