<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="420mm" height="297mm" viewBox="0 0 420 297" version="1.1" id="svg1"
   xmlns="http://www.w3.org/2000/svg">
  <!-- Level 9 "The Chase" — long horizontal corridor, collapsing behind you -->
  <g id="layer1">
    <!-- Long floor -->
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 10,200 400,0" id="floor" />
    <!-- Ceiling (low, claustrophobic) -->
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 10,80 400,0" id="ceil" />
    <!-- Obstacles/pillars to slide under and jump over -->
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 80,130 0,70" id="pillar1" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 140,160 0,40" id="pillar2" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 200,120 0,80" id="pillar3" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 260,150 0,50" id="pillar4" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 310,130 0,70" id="pillar5" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 370,140 0,60" id="pillar6" />
    <!-- Upper path segments -->
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 50,100 30,0" id="u1" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 110,110 30,0" id="u2" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 170,100 30,0" id="u3" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 230,110 30,0" id="u4" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 280,100 30,0" id="u5" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 340,110 40,0" id="u6" />
    <!-- Exit ring at the far right -->
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 400,80 0,120" id="end-wall" />
  </g>
</svg>
