<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="210mm" height="297mm" viewBox="0 0 210 297" version="1.1" id="svg1"
   xmlns="http://www.w3.org/2000/svg">
  <!-- Level 8 "The Core" — boss arena with layered rings -->
  <g id="layer1">
    <!-- Arena floor -->
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 30,250 150,0" id="floor" />
    <!-- Left wall -->
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 30,60 0,190" id="lwall" />
    <!-- Right wall -->
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 180,60 0,190" id="rwall" />
    <!-- Ceiling -->
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 30,60 150,0" id="ceil" />
    <!-- Central boss platform -->
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 75,200 60,0" id="boss-plat" />
    <!-- Upper ring platforms for movement -->
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 40,160 40,0" id="l-plat" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 130,160 40,0" id="r-plat" />
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 80,110 50,0" id="top-plat" />
    <!-- Vertical pillar left -->
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 50,90 0,70" id="vpillar1" />
    <!-- Vertical pillar right -->
    <path style="fill:none;stroke:#000000;stroke-width:0.5"
       d="m 155,90 0,70" id="vpillar2" />
  </g>
</svg>
